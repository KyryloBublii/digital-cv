<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Kyrylo Bublii{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- DaisyUI 4 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Custom CSS — loaded last to override CDN resets -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}" />

  <!-- HTMX 2 -->
  <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
</head>
<body hx-boost="true">

<!-- ════ NAV ════════════════════════════════════════════════════ -->
<nav>
  <div class="nav-inner">
    <a href="{{ url_for('index') }}" class="nav-logo">Kyrylo Bublii</a>
    <ul class="nav-links">
      <li><a href="{{ url_for('index') }}"    {% if active_page == 'home'     %}class="active"{% endif %}>Home</a></li>
      <li><a href="{{ url_for('projects') }}" {% if active_page == 'projects' %}class="active"{% endif %}>Work</a></li>
      <li><a href="{{ url_for('about') }}"    {% if active_page == 'about'    %}class="active"{% endif %}>About</a></li>
      <li><a href="{{ url_for('contact') }}"  {% if active_page == 'contact'  %}class="active"{% endif %}>Contact</a></li>
    </ul>
    <div class="nav-right">
<a href="mailto:kirill.bubliy@gmail.com" class="nav-hire">Hire Me →</a>
    </div>
  </div>
</nav>

<!-- ════ CONTENT ════════════════════════════════════════════════ -->
<main id="content">
  {% block content %}{% endblock %}
</main>

<!-- ════ FOOTER ══════════════════════════════════════════════════ -->
<footer>
  <div class="footer-inner">
    <span class="footer-logo">Kyrylo Bublii</span>
    <span class="footer-copy">© 2026 · All rights reserved</span>
    <div class="footer-right">
      <a href="https://github.com/KyryloBublii" target="_blank" class="footer-icon" aria-label="GitHub">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2Z"/></svg>
      </a>
      <a href="https://www.linkedin.com/in/kyrylobublii/" target="_blank" class="footer-icon" aria-label="LinkedIn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
      <a href="{{ url_for('index') }}" class="footer-top">↑ Top</a>
    </div>
  </div>
</footer>

<script>
  /* Scroll reveal */
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('on'); io.unobserve(e.target); } });
  }, { threshold: 0.07 });
  document.querySelectorAll('.rv').forEach(el => io.observe(el));

  /* Re-run reveal after HTMX swaps content */
  document.body.addEventListener('htmx:afterSwap', () => {
    document.querySelectorAll('.rv:not(.on)').forEach(el => io.observe(el));
  });
</script>

</body>
</html>
