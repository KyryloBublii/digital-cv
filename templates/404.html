{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<section class="s" style="min-height:60vh;display:flex;align-items:center;">
  <div class="wrap" style="text-align:center;">
    <div class="rv">
      <div style="font-family:var(--fd);font-size:clamp(80px,15vw,160px);line-height:1;color:var(--accent);margin-bottom:16px;">404</div>
      <h2 class="s-title" style="margin-bottom:12px;">Page <em>Not Found</em></h2>
      <p style="font-size:15px;font-weight:300;color:var(--ink-2);margin-bottom:32px;">The page you're looking for doesn't exist or has been moved.</p>
      <a href="{{ url_for('index') }}" class="btn-primary">Back to Home →</a>
    </div>
  </div>
</section>
{% endblock %}
